<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book.net</title>
    <link rel="stylesheet" href="styles/output.css">
</head>
<body class="bg-light text-dark leading-normal font-sans">
    <header class="bg-white p-4 shadow-[0_2px_4px_rgba(0,0,0,0.1)] flex flex-col gap-2.5 items-center text-center sm:flex-row sm:justify-between sm:text-left">
        <h2>Book.net</h2>
    </header>

    <div class="p-[15px] max-w-[1200px] mx-auto">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-[repeat(auto-fit,minmax(300px,1fr))]">
            <a href="pages/vendas.html" class="menu-card menu-card-vendas">
                <div class="icon-box">🤝</div>
                <span class="pl-[15px] uppercase text-[0.9rem]">Vendas / Aluguéis</span>
            </a>
            <a href="pages/cadastro-livro.html" class="menu-card menu-card-livro">
                <div class="icon-box">➕</div>
                <span class="pl-[15px] uppercase text-[0.9rem]">Novo Livro</span>
            </a>
            <a href="pages/cadastro-clientes.html" class="menu-card menu-card-clientes">
                <div class="icon-box">👥</div>
                <span class="pl-[15px] uppercase text-[0.9rem]">Cadastro de Clientes</span>
            </a>
        </div>
        <div class="mt-5">
            <h1 class="p-5 mt-[30px] bg-primary text-white rounded-lg text-center text-[1.25rem]">Livros em Destaque</h1>
            <div class="grid grid-cols-2 gap-2.5 mt-5 max-[350px]:grid-cols-1 xs:grid-cols-[repeat(auto-fill,minmax(150px,1fr))] xs:gap-5 md:grid-cols-[repeat(auto-fill,minmax(180px,1fr))]">
                <img class="book-img" src="assets/bluelock-manga.webp" alt="">
                <img class="book-img" src="assets/jjk-manga.jpg" alt="">
                <img class="book-img" src="assets/rothbard-livro.jpg" alt="">
                <img class="book-img" src="assets/george-orwell-livro.jpg" alt="">
                <img class="book-img" src="assets/human-action-mises.jpg" alt="">
            </div>
        </div>
    </div>
</body>
</html>
