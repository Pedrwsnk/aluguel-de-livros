<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book.net</title>
    <link rel="stylesheet" href="../styles/output.css">
</head>
<body class="bg-light text-dark leading-normal font-sans">
    <header class="bg-white p-4 shadow-[0_2px_4px_rgba(0,0,0,0.1)] flex flex-col gap-2.5 items-center text-center sm:flex-row sm:justify-between sm:text-left">
        <a href="../index.html" class="btn-back">Voltar</a>
        <h2>Cadastrar Novo Cliente</h2>
    </header>

    <div class="p-[15px] max-w-[1200px] mx-auto">
        <div class="content-box">
            <form id="form-clientes" action="#" method="POST" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome do Cliente</label>
                        <input id="cliente-nome" type="text" required placeholder="Digite o nome completo">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Telefone</label>
                        <input id="cliente-telefone" type="tel" required placeholder="(00) 00000-0000" maxlength="15">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input id="cliente-email" type="email" required placeholder="example@gmail.com">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>CPF</label>
                        <input id="cliente-cpf" type="text" required placeholder="000.000.000-00" maxlength="14">
                    </div>
                    <div class="form-group">
                        <label>Endereço</label>
                        <input id="cliente-endereco" type="text" required placeholder="Digite o endereço completo">
                    </div>
                </div>

                <button type="submit" class="btn btn-save">Salvar Cliente no Sistema</button>
            </form>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
